Cadastro usuário 
<!DOCTYPE html>
<html>
<head>
    <title>Cadastro de Usuário</title>
</head>
<body>

<center>
    <h1>Cadastro de Usuário</h1>

    <table border="1" cellpadding="10">
        <tr>
            <td align="center">

                <form>
                    Nome completo:<br>
                    <input type="text" size="40"><br><br>

                    Endereço:<br>
                    <input type="text" size="40"><br><br>

                    E-mail:<br>
                    <input type="email" size="40"><br><br>

                    Login:<br>
                    <input type="text" size="40"><br><br>

                    Senha:<br>
                    <input type="password" size="40"><br><br>

                    Confirmar senha:<br>
                    <input type="password" size="40"><br><br>

                    <br>

                    <input type="reset" value="Limpar">
                </form>

                <br>

                <a href="http://127.0.0.1:5500/login.html">
                    <button>Cadastrar</button>
                </a>

                <br><br>

                <a href="http://127.0.0.1:5500/login.html">Voltar</a>

            </td>
        </tr>
    </table>
</center>

</body>
</html>
