Cadastro produto
<!DOCTYPE html>
<html>
<head>
    <title>Cadastro de Produto</title>
</head>
<body>

<center>
    <h1>Cadastro de Produto</h1>

    <table border="1" cellpadding="10">
        <tr>
            <td>
                <form>
                    Nome:<br>
                    <input type="text" size="40"><br><br>

                    Descrição:<br>
                    <input type="text" size="40"><br><br>

                    Unidade:<br>
                    <input type="text" size="40"><br><br>

                    Quantidade:<br>
                    <input type="number"><br><br>

                    Valor:<br>
                    <input type="number" step="0.01"><br><br>
                </form>

                <center>
                    <a href="principal.html">
                        <button>Cadastrar</button>
                    </a>
                </center>

                <br>

                <center>
                    <a href="principal.html">Voltar</a>
                </center>
            </td>
        </tr>
    </table>
</center>

</body>
</html>
